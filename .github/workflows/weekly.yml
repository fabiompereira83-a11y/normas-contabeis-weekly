name: Atualização semanal normas contábeis

on:
  schedule:
    - cron: '0 12 * * 1' # toda segunda-feira às 12:00 UTC
  workflow_dispatch:

permissions: 
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependências
        run: pip install -r requirements.txt
      
      - name: Executar script
        run: python scripts/fetch_updates.py

      - name: Commit do arquivo gerado
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add updates_weekly.md
          git commit -m "Update semanal normas contábeis" || echo "Nada novo"
          git push
